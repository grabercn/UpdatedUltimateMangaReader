name: Build & Release

on:
  push:
    branches: [master, main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION | tr -d '\r\n ')" >> $GITHUB_OUTPUT
        shell: bash

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'
          cache: true

      - name: Cache vcpkg packages
        id: vcpkg-cache
        uses: actions/cache@v4
        with:
          path: C:\vcpkg\installed
          key: vcpkg-win-x64-v2
          restore-keys: vcpkg-win-x64-

      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        run: |
          vcpkg install libjpeg-turbo:x64-windows libpng:x64-windows openssl:x64-windows
        shell: cmd

      - name: Build
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" x64
          set VCPKG_ROOT=C:\vcpkg
          qmake UltimateMangaReader.pro CONFIG+=desktop "VCPKG_INSTALLED=C:/vcpkg/installed/x64-windows" "INCLUDEPATH+=C:/vcpkg/installed/x64-windows/include" "LIBS+=-LC:/vcpkg/installed/x64-windows/lib" "APP_VERSION=${{ steps.version.outputs.version }}"
          jom -j %NUMBER_OF_PROCESSORS% 2>nul || nmake
        shell: cmd

      - name: Deploy Qt
        run: |
          mkdir deploy
          copy release\UltimateMangaReader.exe deploy\
          copy C:\vcpkg\installed\x64-windows\bin\turbojpeg.dll deploy\
          copy C:\vcpkg\installed\x64-windows\bin\jpeg62.dll deploy\
          copy C:\vcpkg\installed\x64-windows\bin\libpng16.dll deploy\
          copy C:\vcpkg\installed\x64-windows\bin\zlib1.dll deploy\
          for %%f in (C:\vcpkg\installed\x64-windows\bin\libssl*.dll C:\vcpkg\installed\x64-windows\bin\libcrypto*.dll) do copy %%f deploy\
          windeployqt deploy\UltimateMangaReader.exe --no-translations --no-compiler-runtime
        shell: cmd

      - name: Package
        run: |
          7z a UltimateMangaReader-Windows.zip ./deploy/*
        shell: cmd

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltimateMangaReader-Windows
          path: UltimateMangaReader-Windows.zip

  build-kobo:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and cache toolchain image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.kobo
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/umr-kobo-toolchain:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/umr-kobo-toolchain:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/umr-kobo-toolchain:buildcache,mode=max
        timeout-minutes: 120

      - name: Build Kobo binary
        run: |
          mkdir -p output
          docker run --rm -v $(pwd):/src:ro -v $(pwd)/output:/output \
            ghcr.io/${{ github.repository_owner }}/umr-kobo-toolchain:latest \
            sh -c "cp -r /src /build/app && \
              ln -sf /opt/qt5-kobo-platform-plugin /build/qt5-kobo-platform-plugin && \
              cd /build/app && \
              \${QMAKE} CONFIG+=kobo 2>&1 && \
              make -j\$(nproc) 2>&1 | tail -50 && \
              cp UltimateMangaReader /output/"
        timeout-minutes: 30

      - name: Package Kobo
        run: |
          mkdir -p kobo-package/.adds/UltimateMangaReader
          cp output/UltimateMangaReader kobo-package/.adds/UltimateMangaReader/
          cp eink.qss kobo-package/.adds/UltimateMangaReader/
          cp -r images kobo-package/.adds/UltimateMangaReader/
          cd kobo-package && tar czf ../UltimateMangaReader-Kobo.tar.gz .adds/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: UltimateMangaReader-Kobo
          path: UltimateMangaReader-Kobo.tar.gz

  release:
    needs: [build-windows, build-kobo]
    if: always() && needs.build-windows.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: UltimateMangaReader-Windows

      - name: Download Kobo artifact
        uses: actions/download-artifact@v4
        with:
          name: UltimateMangaReader-Kobo
        continue-on-error: true

      - name: List downloaded files
        run: |
          echo "=== Files in workspace ==="
          ls -la *.zip *.tar.gz 2>/dev/null || echo "No zip/tar.gz found"
          find . -maxdepth 2 -name "*.zip" -o -name "*.tar.gz" 2>/dev/null

      - name: Rotate releases (keep previous as backup)
        run: |
          # Delete the previous-stable backup if it exists
          gh release delete previous-stable --yes 2>/dev/null || true
          git push origin :refs/tags/previous-stable 2>/dev/null || true

          # Rename current latest to previous-stable
          LATEST_TAG=$(gh release view latest --json tagName -q .tagName 2>/dev/null || echo "")
          if [ -n "$LATEST_TAG" ]; then
            LATEST_NAME=$(gh release view latest --json name -q .name 2>/dev/null)
            LATEST_BODY=$(gh release view latest --json body -q .body 2>/dev/null)

            # Download current latest assets to re-upload as previous
            mkdir -p /tmp/prev-assets
            gh release download latest -D /tmp/prev-assets 2>/dev/null || true

            # Create previous-stable from current latest
            gh release create previous-stable \
              --title "Previous: $LATEST_NAME" \
              --notes "Backup of previous stable release.

          $LATEST_BODY" \
              /tmp/prev-assets/* 2>/dev/null || true

            # Delete current latest
            gh release delete latest --yes 2>/dev/null || true
            git push origin :refs/tags/latest 2>/dev/null || true
            rm -rf /tmp/prev-assets
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get release info
        id: info
        run: |
          echo "version=$(cat VERSION | tr -d '\r\n ')" >> $GITHUB_OUTPUT
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT
          echo "message=$(git log -1 --pretty=%B | head -1)" >> $GITHUB_OUTPUT

      - name: Create/Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "v${{ steps.info.outputs.version }} (${{ steps.info.outputs.date }})"
          body: |
            **v${{ steps.info.outputs.version }}** — ${{ steps.info.outputs.message }}

            ---

            ## Windows
            1. Download `UltimateMangaReader-Windows.zip`
            2. Extract the zip
            3. Run `release/UltimateMangaReader.exe`

            ## Kobo
            1. Download `UltimateMangaReader-Kobo.tar.gz`
            2. Connect Kobo via USB
            3. Extract the archive to the root of your Kobo drive (the `.adds` folder goes in the root)
            4. Eject and reboot - launch from NickelMenu

            > Already installed? The app checks for updates on startup and can update itself.
          fail_on_unmatched_files: false
          files: |
            UltimateMangaReader-Windows.zip
            UltimateMangaReader-Kobo.tar.gz
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version for next release
        run: |
          # Read current version and increment patch
          VERSION=$(cat VERSION | tr -d '\r\n ')
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          NEXT_PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}"
          echo "$NEXT_VERSION" > VERSION
          echo "Bumped version: $VERSION -> $NEXT_VERSION"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master || true
          git add VERSION
          git commit -m "Auto-bump version to $NEXT_VERSION [skip ci]" || true
          git push || git pull --rebase origin master && git push || true
